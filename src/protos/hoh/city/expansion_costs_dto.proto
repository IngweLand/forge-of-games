syntax = "proto3";
import "expansion_unlocking_type.proto";
import "google/protobuf/any.proto";

option csharp_namespace = "Ingweland.Fog.Inn.Models.Hoh";

message ExpansionCostsDTO {
    string id = 1;
    string cityId = 2;
    ExpansionUnlockingType unlockingType = 3;
    repeated google.protobuf.Any packedComponents = 4;
    string expansionId = 5;
}