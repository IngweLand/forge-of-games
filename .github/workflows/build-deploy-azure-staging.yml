name: '[Staging] Build and deploy to Azure + S3'

env:
  AZURE_WEBAPP_NAME: 'fog-dev'
  WEBAPP_PROJECT_PATH: './src/WebApp/WebApp.csproj'
  PUBLISH_OUTPUT_PATH: './publish'
  S3_FOLDER_PATH: 'fogcdn/app/staging'

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Publish
        run: dotnet publish ${{ env.WEBAPP_PROJECT_PATH }} -c Release -o ${{ env.PUBLISH_OUTPUT_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ${{ env.PUBLISH_OUTPUT_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Staging'
      url: ${{ steps.deploy-to-azure.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ${{ env.PUBLISH_OUTPUT_PATH }}
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync _framework to S3
        run: |
          aws s3 rm s3://${{ env.S3_FOLDER_PATH }}/_framework --recursive
          aws s3 cp ${{ env.PUBLISH_OUTPUT_PATH }}/wwwroot/_framework \
          s3://${{ env.S3_FOLDER_PATH }}/_framework \
          --recursive \
          --cache-control "public, max-age=31536000, immutable"

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        id: deploy-to-azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_OUTPUT_PATH }}
