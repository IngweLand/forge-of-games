name: '[Base] Build and deploy to Azure + S3'

env:
  WEBAPP_PROJECT_PATH: './src/WebApp/WebApp.csproj'
  PUBLISH_OUTPUT_PATH: './publish'

on:
  workflow_call:
    inputs:
      ENVIRONMENT_NAME:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.ENVIRONMENT_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          
      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
            
      - name: Generate Syncfusion license key file
        run: |
          cat > ./src/WebApp.Client/Providers/FogSyncfusionLicenseProvider.Key.cs << EOF
          namespace Ingweland.Fog.WebApp.Client.Providers;
          public static partial class FogSyncfusionLicenseProvider
          {
              private static string LicenseKey => "${{ secrets.SYNCFUSION_LICENSE_KEY }}";
          }
          EOF

      - name: Publish
        run: dotnet publish ${{ env.WEBAPP_PROJECT_PATH }} -c Release -o ${{ env.PUBLISH_OUTPUT_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ${{ env.PUBLISH_OUTPUT_PATH }}

  s3-upload:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ inputs.ENVIRONMENT_NAME }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ${{ env.PUBLISH_OUTPUT_PATH }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload wwwroot to S3
        run: |
          aws s3 rm s3://${{ vars.S3_APP_FOLDER_PATH }} --recursive
          aws s3 cp ${{ env.PUBLISH_OUTPUT_PATH }}/wwwroot \
          s3://${{ vars.S3_APP_FOLDER_PATH }} \
          --recursive \
          --cache-control "public, max-age=31536000, immutable"


  deploy:
    runs-on: ubuntu-latest
    needs: s3-upload
    environment:
      name: ${{ inputs.ENVIRONMENT_NAME }}
      url: ${{ steps.deploy-to-azure.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ${{ env.PUBLISH_OUTPUT_PATH }}
          
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        id: deploy-to-azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_OUTPUT_PATH }}
